<!DOCTYPE html>
<HTML>
        <HEAD>
            <title>PvzDle - NEW UPDATE</title>
            <link rel="icon" type="images/png" href="Image/Others/Logo.png"/>
            <meta charset="UTF-8">
        </HEAD>
        <style>
        .fundo {
            top: 0;
            left: 0;
            z-index: -2;
            width: 100%;
            height: 100%;
            position: fixed;
        }
        </style>
        <script>
            function isMobile() {
                const regex = /Mobi|Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i;
                return regex.test(navigator.userAgent);
            }

            function celolar() {
            if (isMobile()) {
                document.getElementById("fundinho").src = "Image/Pages/creditsMobileDNV.jpg"
            } else {
                document.getElementById("fundinho").src = "Image/Pages/Creditsdnv.png"
            }
            }
        </script>
        <BODY onload="celolar()">
                <img id="fundinho" class="fundo" src="">
        </BODY>
</HTML>
